services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      SEED_USERNAME: ${SEED_USERNAME:-admin}
      SEED_PASSWORD: ${SEED_PASSWORD:-admin}
      FRONTEND_ORIGIN: http://localhost:5173
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_SHEETS_CREDENTIALS_FILE: /secrets/google-service-account.json
      GOOGLE_SHEETS_SPREADSHEET_NAME: "Dados Climáticos por Produtor"
      GOOGLE_SHEETS_WORKSHEET_NAME: ${GOOGLE_SHEETS_WORKSHEET_NAME:-Sheet1}
      GOOGLE_SHEETS_PROPRIEDADES_SPREADSHEET_NAME: "Produtores Propriedades"
      GOOGLE_SHEETS_PROPRIEDADES_WORKSHEET_NAME: ${GOOGLE_SHEETS_PROPRIEDADES_WORKSHEET_NAME:-Sheet1}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      WINDY_API_KEY: ${WINDY_API_KEY}
    volumes:
      - ./backend:/code
      - ./logs:/logs
      - ./camera-dados-meteorologicos-1d6806cf7e78.json:/secrets/google-service-account.json:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  db_data:
