server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve estáticos e cai no index.html (React Router client-side).
    # Os headers de segurança ficam aqui (documento/estáticos); as respostas de
    # /api carregam os headers definidos pelo próprio backend.
    location / {
        try_files $uri /index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Proxy da API para o backend interno da rede do compose.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (/api/message/stream): sem buffering e conexão longa, para os
        # eventos chegarem em tempo real (casa com o X-Accel-Buffering: no do backend).
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
